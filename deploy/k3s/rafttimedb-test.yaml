# K3s test deployment — single RaftTimeDB node to verify K8s deployment works.
# Usage: kubectl apply -f rafttimedb-test.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: rafttimedb-raft
  labels:
    app: rafttimedb
spec:
  clusterIP: None
  selector:
    app: rafttimedb
  ports:
    - port: 4001
      name: raft

---
apiVersion: v1
kind: Service
metadata:
  name: rafttimedb
  labels:
    app: rafttimedb
spec:
  type: NodePort
  selector:
    app: rafttimedb
  ports:
    - port: 3001
      name: ws
      targetPort: 3001
      nodePort: 30001

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rafttimedb
spec:
  serviceName: rafttimedb-raft
  replicas: 1
  selector:
    matchLabels:
      app: rafttimedb
  template:
    metadata:
      labels:
        app: rafttimedb
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: rafttimedb
          image: docker-node-1:latest
          imagePullPolicy: Never
          command: ["rafttimedb"]
          args:
            - "--node-id=1"
            - "--listen-addr=0.0.0.0:3001"
            - "--raft-addr=0.0.0.0:4001"
            - "--stdb-url=ws://127.0.0.1:3000"
          ports:
            - containerPort: 3001
              name: ws
            - containerPort: 4001
              name: raft

        - name: spacetimedb
          image: clockworklabs/spacetime:latest
          command: ["spacetime"]
          args: ["start", "--listen-addr", "0.0.0.0:3000"]
          ports:
            - containerPort: 3000
              name: stdb

# Default values for RaftTimeDB Helm chart

replicas: 3

image:
  repository: ghcr.io/nodenestor/rafttimedb
  tag: latest
  pullPolicy: IfNotPresent

spacetimedb:
  image: clockworklabs/spacetime
  tag: latest
  storage: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 4Gi

rafttimedb:
  clientPort: 3001
  raftPort: 4001
  storage: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi

service:
  type: LoadBalancer
  port: 3001

# TLS encryption for inter-node Raft RPCs (optional)
tls:
  enabled: false
  # Paths inside the container (mount certs via a Secret volume)
  certPath: /etc/rafttimedb/certs/node.crt
  keyPath: /etc/rafttimedb/certs/node.key
  caPath: /etc/rafttimedb/certs/ca.crt
  # Name of the Kubernetes Secret containing the TLS certificates
  secretName: rafttimedb-tls

# Prometheus metrics
metrics:
  enabled: true
  port: 4001
  path: /metrics

# Health checks
healthCheck:
  enabled: true
  path: /cluster/health
  livenessInitialDelay: 30
  readinessInitialDelay: 10
